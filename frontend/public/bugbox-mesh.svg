<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="meshA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:0.35"/>
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.5"/>
    </linearGradient>
    <radialGradient id="meshB" cx="70%" cy="20%" r="50%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="meshC" cx="15%" cy="85%" r="45%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="60"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#0c1222"/>
  <g filter="url(#blur)" opacity="0.9">
    <ellipse cx="400" cy="200" rx="500" ry="350" fill="url(#meshB)"/>
    <ellipse cx="1500" cy="900" rx="450" ry="400" fill="url(#meshC)"/>
    <ellipse cx="960" cy="540" rx="600" ry="500" fill="url(#meshA)"/>
  </g>
</svg>
