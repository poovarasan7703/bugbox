<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1222"/>
      <stop offset="50%" style="stop-color:#141c2f"/>
      <stop offset="100%" style="stop-color:#1a2540"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1e293b" stroke-width="0.3" opacity="0.4"/>
      <!-- Code-like symbols -->
      <text x="10" y="15" fill="#334155" font-family="monospace" font-size="8" opacity="0.2">{</text>
      <text x="35" y="35" fill="#334155" font-family="monospace" font-size="6" opacity="0.2">}</text>
      <text x="45" y="50" fill="#334155" font-family="monospace" font-size="5" opacity="0.15">bug</text>
    </pattern>
    <radialGradient id="glow1" cx="20%" cy="30%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#ef4444;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="60%" cy="20%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.08"/>
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <rect width="100%" height="100%" fill="url(#glow1)"/>
  <rect width="100%" height="100%" fill="url(#glow2)"/>
  <rect width="100%" height="100%" fill="url(#glow3)"/>

  <!-- Bug tracking themed elements -->
  <!-- Magnifying glass -->
  <g opacity="0.1" transform="translate(150, 200)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#64748b" stroke-width="2"/>
    <line x1="25" y1="25" x2="50" y2="50" stroke="#64748b" stroke-width="2"/>
    <circle cx="35" cy="-5" r="3" fill="#ef4444"/>
  </g>

  <!-- Bug icons -->
  <g opacity="0.08" transform="translate(1600, 150)">
    <circle cx="0" cy="0" r="8" fill="#ef4444"/>
    <circle cx="-4" cy="-3" r="2" fill="#1e293b"/>
    <circle cx="4" cy="-3" r="2" fill="#1e293b"/>
    <line x1="-6" y1="2" x2="-10" y2="6" stroke="#ef4444" stroke-width="1"/>
    <line x1="6" y1="2" x2="10" y2="6" stroke="#ef4444" stroke-width="1"/>
    <line x1="-8" y1="4" x2="-12" y2="8" stroke="#ef4444" stroke-width="1"/>
    <line x1="8" y1="4" x2="12" y2="8" stroke="#ef4444" stroke-width="1"/>
  </g>

  <!-- Code brackets -->
  <g opacity="0.15">
    <text x="300" y="800" fill="#475569" font-family="monospace" font-size="24">{</text>
    <text x="350" y="850" fill="#475569" font-family="monospace" font-size="18">function</text>
    <text x="450" y="850" fill="#475569" font-family="monospace" font-size="18">reportBug()</text>
    <text x="580" y="850" fill="#475569" font-family="monospace" font-size="18">{</text>
    <text x="300" y="900" fill="#475569" font-family="monospace" font-size="24">}</text>
    <text x="580" y="900" fill="#475569" font-family="monospace" font-size="24">}</text>
  </g>

  <!-- Screen/window outlines with bug tracking context -->
  <rect x="200" y="150" width="400" height="250" rx="8" fill="none" stroke="#334155" stroke-width="1" opacity="0.25"/>
  <text x="220" y="175" fill="#64748b" font-family="system-ui" font-size="12" opacity="0.4">Bug Report #1234</text>
  <rect x="210" y="185" width="80" height="4" rx="2" fill="#ef4444" opacity="0.3"/>
  <rect x="210" y="195" width="120" height="3" rx="1.5" fill="#64748b" opacity="0.2"/>
  <rect x="210" y="205" width="100" height="3" rx="1.5" fill="#64748b" opacity="0.2"/>

  <rect x="1320" y="680" width="350" height="220" rx="8" fill="none" stroke="#334155" stroke-width="1" opacity="0.2"/>
  <text x="1340" y="705" fill="#64748b" font-family="system-ui" font-size="12" opacity="0.4">Developer Dashboard</text>
  <circle cx="1600" cy="730" r="8" fill="#10b981" opacity="0.3"/>
  <circle cx="1620" cy="730" r="8" fill="#f59e0b" opacity="0.3"/>
  <circle cx="1640" cy="730" r="8" fill="#ef4444" opacity="0.3"/>

  <rect x="700" y="400" width="500" height="300" rx="8" fill="none" stroke="#334155" stroke-width="1" opacity="0.15"/>
  <text x="720" y="425" fill="#64748b" font-family="system-ui" font-size="12" opacity="0.4">Screen Recording</text>
  <rect x="710" y="435" width="200" height="120" rx="4" fill="#1e293b" opacity="0.2"/>
  <circle cx="810" cy="495" r="15" fill="#ef4444" opacity="0.4"/>
  <text x="805" y="500" fill="#ffffff" font-family="system-ui" font-size="10" opacity="0.6" text-anchor="middle">REC</text>

  <!-- Floating particles (representing bugs/data points) -->
  <circle cx="400" cy="300" r="2" fill="#38bdf8" opacity="0.3"/>
  <circle cx="1200" cy="500" r="1.5" fill="#10b981" opacity="0.4"/>
  <circle cx="800" cy="800" r="1" fill="#f59e0b" opacity="0.5"/>
  <circle cx="1500" cy="200" r="2.5" fill="#ef4444" opacity="0.2"/>
  <circle cx="600" cy="600" r="1" fill="#8b5cf6" opacity="0.3"/>
</svg>
